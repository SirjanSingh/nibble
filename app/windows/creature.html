<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="creature.css" />
</head>
<body>
  <div id="stage" class="stage" data-state="sleeping">

    <!-- click-through mini panel (the pet's own "required" view) -->
    <div id="mini" class="mini hidden">
      <div class="mini-h">
        <div>
          <div class="mini-amt" id="m-spent">$0.00</div>
          <div class="mini-sub" id="m-sub">today</div>
        </div>
        <div class="mini-ring" id="m-ring"><span id="m-pct">0%</span></div>
      </div>
      <div class="mini-list" id="m-list"></div>
      <button class="mini-foot" id="m-open">Open full dashboard ↗</button>
    </div>

    <div id="bubble" class="bubble hidden"><span id="bubble-text"></span></div>
    <div id="hint" class="hint">click me</div>

    <div id="creature" class="creature" title="Click for a quick look">
      <svg viewBox="0 0 200 210" id="svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="body" cx="40%" cy="32%" r="75%">
            <stop class="g1" offset="0%"/>
            <stop class="g2" offset="60%"/>
            <stop class="g3" offset="100%"/>
          </radialGradient>
          <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5"/>
          </filter>
        </defs>

        <ellipse id="shadow" cx="100" cy="188" rx="52" ry="11"
                 fill="rgba(0,0,0,.28)" filter="url(#soft)"/>

        <g id="antenna">
          <path d="M100 60 Q104 38 96 22" stroke="var(--c2)"
                stroke-width="5" fill="none" stroke-linecap="round"/>
          <circle id="orb" cx="95" cy="19" r="8"/>
        </g>

        <path id="bodyShape"
          d="M100 56 C150 56 168 96 168 128 C168 168 138 184 100 184
             C62 184 32 168 32 128 C32 96 50 56 100 56 Z"/>
        <ellipse cx="78" cy="92" rx="30" ry="18"
                 fill="rgba(255,255,255,.30)"/>

        <ellipse class="cheek" cx="62" cy="138" rx="12" ry="7"/>
        <ellipse class="cheek" cx="138" cy="138" rx="12" ry="7"/>

        <g id="eyes">
          <g class="eye" transform="translate(74 122)">
            <ellipse class="ball" rx="11" ry="13"/>
            <circle class="pupil" cx="2" cy="2" r="4.5"/>
            <circle class="glint" cx="-3" cy="-4" r="2.6"/>
          </g>
          <g class="eye" transform="translate(126 122)">
            <ellipse class="ball" rx="11" ry="13"/>
            <circle class="pupil" cx="2" cy="2" r="4.5"/>
            <circle class="glint" cx="-3" cy="-4" r="2.6"/>
          </g>
        </g>

        <path id="mouth" d="M88 152 Q100 160 112 152" stroke="#15202b"
              stroke-width="4" fill="none" stroke-linecap="round"/>
        <path id="sweat" d="M150 96 q5 9 0 14 a5 5 0 1 1 0 -14 Z"
              fill="#7fd0f5"/>
        <text id="zzz" x="150" y="86" class="zzz">z</text>
      </svg>

      <div id="badge" class="badge">$0.00</div>
    </div>
  </div>

  <script src="ws.js"></script>
  <script src="creature.js"></script>
</body>
</html>
